<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Стиль и Грация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --noir: #07070A; --graphite: #111118; --surface: #18181F; --raised: #1F1F28;
            --border: rgba(201,168,76,0.18); --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.10);
            --cream: #EDE3D0; --cream-dim: #A89E8C; --mist: #6A6A7A;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--noir); color: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; -webkit-font-smoothing: antialiased; }
        body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.7; }
        .brand-serif { font-family: 'Playfair Display', serif; }
        .fade-up { animation: fadeUp 0.85s cubic-bezier(0.22,1,0.36,1) both; }
        .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.2s; } .d3 { animation-delay: 0.3s; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .luxury-input { width: 100%; padding: 13px 18px; background: var(--raised); border: 1px solid var(--border); color: var(--cream); font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300; border-radius: 2px; outline: none; transition: border-color 0.25s, background 0.25s; }
        .luxury-input::placeholder { color: var(--mist); }
        .luxury-input:focus { border-color: var(--gold); background: var(--surface); }
        .btn-gold { width: 100%; padding: 15px; background: linear-gradient(135deg, #B8942E, #C9A84C, #DDB95E); color: #07070A; font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; border: none; cursor: pointer; border-radius: 2px; transition: all 0.35s ease; }
        .btn-gold:hover { box-shadow: 0 8px 40px rgba(201,168,76,0.3); }
    </style>
</head>
<body style="position: relative; z-index: 1;">
    <div style="width: 100%; max-width: 480px;">
        <div class="fade-up" style="margin-bottom: 40px; text-align: center;">
            <a href="/" style="text-decoration: none; display: inline-flex; align-items: center; gap: 12px;">
                <div style="width: 34px; height: 34px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; border-radius: 2px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                </div>
                <span class="brand-serif" style="font-size: 17px; color: var(--cream-dim); font-style: italic;">Стиль и Грация</span>
            </a>
        </div>

        <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 48px 44px;">
            <div class="fade-up d1" style="margin-bottom: 32px;">
                <div style="font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px;">создать аккаунт</div>
                <h1 class="brand-serif" style="font-size: 36px; font-weight: 500; color: var(--cream); line-height: 1.05; margin-bottom: 10px;">Регистрация</h1>
                <p style="font-size: 13px; color: var(--mist); font-weight: 300; line-height: 1.6;">Создайте аккаунт для онлайн-записи и персональных рекомендаций.</p>
            </div>

            {% if error %}
            <div class="fade-up d1" style="background: rgba(220,80,80,0.08); border: 1px solid rgba(220,80,80,0.25); color: #E8988C; padding: 13px 18px; border-radius: 2px; font-size: 13px; margin-bottom: 24px;">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/register" class="fade-up d2" style="display: flex; flex-direction: column; gap: 18px;">
                <div>
                    <label style="display: block; font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mist); margin-bottom: 9px;">Имя</label>
                    <input type="text" name="name" required class="luxury-input" placeholder="Ваше имя">
                </div>
                <div>
                    <label style="display: block; font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mist); margin-bottom: 9px;">Email</label>
                    <input type="email" name="email" required class="luxury-input" placeholder="your@email.com">
                </div>
                <div>
                    <label style="display: block; font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mist); margin-bottom: 9px;">Пароль</label>
                    <input type="password" name="password" required class="luxury-input" placeholder="Минимум 6 символов">
                </div>
                <div style="padding-top: 8px;">
                    <button type="submit" class="btn-gold">Создать аккаунт</button>
                </div>
            </form>

            <p class="fade-up d3" style="font-size: 12px; color: var(--mist); margin-top: 24px; text-align: center;">
                Уже есть аккаунт?
                <a href="/login" style="color: var(--gold); text-decoration: none; font-weight: 500; margin-left: 4px;">Войти</a>
            </p>
        </div>
    </div>
</body>
</html>
