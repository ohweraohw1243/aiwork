<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Стиль и Грация</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 max-w-sm w-full">
        <h1 class="text-2xl font-bold text-center text-slate-900 mb-6">Вход в систему</h1>
        
        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" required value="test@test.ru"
                       class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
                <input type="password" name="password" required value="123"
                       class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition">
                Войти
            </button>
        </form>
        
        <p class="text-center text-sm text-slate-500 mt-6">
            Нет аккаунта? <a href="/register" class="text-indigo-600 hover:underline">Зарегистрироваться</a>
        </p>
    </div>
</body>
</html>
