<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стиль и Грация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(244, 114, 182, 0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(196, 181, 253, 0.18), transparent 24%),
                linear-gradient(180deg, #fffafc 0%, #f8fafc 100%);
            color: #1e293b;
        }
        .brand-serif { font-family: 'Cormorant Garamond', serif; }
        .glass-card { background: rgba(255,255,255,0.86); backdrop-filter: blur(18px); box-shadow: 0 20px 60px rgba(15,23,42,0.08); }
    </style>
</head>
<body>
    <main class="max-w-6xl mx-auto p-4 md:p-8 min-h-screen flex items-center">
        <section class="glass-card rounded-[32px] border border-white/40 p-6 md:p-10 w-full overflow-hidden relative">
            <div class="absolute -top-12 -right-10 w-44 h-44 rounded-full bg-pink-200/40 blur-3xl"></div>
            <div class="absolute -bottom-8 left-1/4 w-36 h-36 rounded-full bg-fuchsia-200/30 blur-3xl"></div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center relative">
                <div>
                    <div class="inline-flex items-center px-3 py-1 rounded-full bg-rose-50 border border-rose-100 text-xs font-bold uppercase tracking-[0.18em] text-pink-700 mb-5">
                        салон красоты
                    </div>
                    <h1 class="brand-serif text-5xl md:text-7xl leading-[0.95] text-slate-900 mb-4">
                        Стиль и Грация
                    </h1>
                    <p class="text-slate-600 text-base md:text-lg leading-relaxed max-w-xl mb-7">
                        Подберем уход и процедуру под ваш запрос. Начните с умного чата, и AI-ассистент поможет выбрать услугу и перейти к записи.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <a href="/smart-booking" class="bg-gradient-to-r from-pink-600 to-fuchsia-600 text-white px-7 py-3.5 rounded-full text-sm font-semibold text-center shadow-lg shadow-fuchsia-100 hover:opacity-95 transition">
                            Записаться
                        </a>
                        <a href="/login" class="px-7 py-3.5 rounded-full text-sm font-semibold text-pink-700 bg-rose-50 border border-rose-100 text-center hover:bg-rose-100 transition">
                            Войти в кабинет
                        </a>
                    </div>
                </div>

                <div class="relative min-h-[360px] rounded-[28px] overflow-hidden">
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80')] bg-cover bg-center"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/45 to-transparent"></div>
                    <div class="absolute bottom-5 left-5 right-5 bg-white/90 backdrop-blur rounded-2xl p-4 border border-white/60">
                        <p class="text-sm text-slate-600 leading-relaxed">Нажмите "Записаться" и AI задаст пару вопросов, чтобы предложить подходящую услугу и следующий шаг для записи.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
