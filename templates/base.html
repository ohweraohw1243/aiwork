<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Личный кабинет{% endblock %} | Стиль и Грация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <!-- Тайллвинд для красоты и скорости -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --salon-rose: #fdf2f8;
            --salon-peach: #fff7ed;
            --salon-lilac: #f5f3ff;
            --salon-ink: #1e293b;
        }

        .gradient-text {
            background-image: linear-gradient(45deg, #c026d3, #db2777, #fb7185);
            background-size: 100%;
            -webkit-background-clip: text;
            -moz-background-clip: text;
            -webkit-text-fill-color: transparent; 
            -moz-text-fill-color: transparent;
        }

        body {
            font-family: 'Manrope', sans-serif;
            color: var(--salon-ink);
            background:
                radial-gradient(circle at top left, rgba(244, 114, 182, 0.12), transparent 30%),
                radial-gradient(circle at top right, rgba(167, 139, 250, 0.14), transparent 26%),
                linear-gradient(180deg, #fffafc 0%, #f8fafc 100%);
        }

        .brand-serif {
            font-family: 'Cormorant Garamond', serif;
        }

        .salon-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        }

        .salon-chip {
            background: linear-gradient(135deg, rgba(253, 242, 248, 0.95), rgba(255, 247, 237, 0.95));
            border: 1px solid rgba(251, 191, 36, 0.16);
        }

        .floating-orb {
            animation: float 8s ease-in-out infinite;
        }

        .floating-orb.delay-1 {
            animation-delay: -2s;
        }

        .floating-orb.delay-2 {
            animation-delay: -4s;
        }

        .fade-up {
            animation: fadeUp 0.85s ease both;
        }

        .fade-up.delay-1 {
            animation-delay: 0.08s;
        }

        .fade-up.delay-2 {
            animation-delay: 0.16s;
        }

        .hover-lift {
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-12px) translateX(8px); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="font-sans antialiased text-slate-800">
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute -top-16 -left-16 h-72 w-72 rounded-full bg-fuchsia-200/30 blur-3xl"></div>
        <div class="absolute top-24 -right-12 h-80 w-80 rounded-full bg-rose-200/30 blur-3xl"></div>
        <div class="absolute bottom-0 left-1/3 h-64 w-64 rounded-full bg-amber-100/25 blur-3xl"></div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-8 relative z-10">
        
        <!-- Шапка с Навигацией -->
        <header class="salon-card px-6 pt-6 pb-0 rounded-[28px] border border-white/40 mb-8 mt-4 overflow-hidden">
            <div class="flex flex-col md:flex-row justify-between flex-wrap items-start md:items-center mb-6 gap-4">
                <div class="flex items-center gap-4">
                    <div class="p-[2px] rounded-full bg-gradient-to-br from-fuchsia-400 via-pink-400 to-amber-300 shadow-lg shadow-fuchsia-100">
                        <img src="https://ui-avatars.com/api/?name={{ data.name }}&background=fdf2f8&color=be185d&size=72&rounded=true" alt="Avatar" class="w-14 h-14 rounded-full ring-4 ring-white/90">
                    </div>
                    <div>
                        <div class="inline-flex items-center gap-2 salon-chip px-3 py-1 rounded-full text-xs font-bold uppercase tracking-[0.2em] text-pink-700 mb-3">
                            beauty salon
                        </div>
                        <h1 class="brand-serif text-4xl md:text-5xl font-bold text-slate-900 tracking-tight leading-none">Стиль и <span class="gradient-text">Грация</span></h1>
                        <p class="text-slate-500 mt-2 text-sm md:text-base">
                            Добро пожаловать, <span class="font-semibold text-slate-700">{{ data.name }}</span>!
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="/logout" class="salon-chip text-rose-600 px-5 py-2.5 rounded-full text-sm font-semibold hover:scale-[1.02] transition shadow-sm flex items-center gap-2">
                        Выйти
                    </a>
                </div>
            </div>
            
            <!-- Накладная навигация -->
            <nav class="flex gap-3 md:gap-4 border-b border-slate-100 overflow-x-auto whitespace-nowrap hide-scrollbar">
                <a href="/" class="pb-4 px-3 text-sm font-bold rounded-t-xl border-b-2 transition {% if request.path == '/' %}border-pink-500 text-pink-700 bg-pink-50/60{% else %}border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50{% endif %}">
                    👨‍💼 Мой профиль 
                </a>
                <a href="/booking" class="pb-4 px-3 text-sm font-bold rounded-t-xl border-b-2 transition {% if request.path == '/booking' %}border-pink-500 text-pink-700 bg-pink-50/60{% else %}border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50{% endif %}">
                    📅 Онлайн-запись
                </a>
                <a href="/services" class="pb-4 px-3 text-sm font-bold rounded-t-xl border-b-2 transition {% if '/service' in request.path %}border-pink-500 text-pink-700 bg-pink-50/60{% else %}border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50{% endif %}">
                    ✨ Наши услуги (AI)
                </a>
                <a href="/qa" class="pb-4 px-3 text-sm font-bold rounded-t-xl border-b-2 transition {% if request.path == '/qa' %}border-pink-500 text-pink-700 bg-pink-50/60{% else %}border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50{% endif %}">
                    💡 Вопросы и ответы
                </a>
            </nav>
        </header>

        <!-- Основной контент страницы -->
        <main class="pb-8">
            {% block content %}{% endblock %}
        </main>
        
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
