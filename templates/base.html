<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Личный кабинет{% endblock %} | Стиль и Грация</title>
    <!-- Тайллвинд для красоты и скорости -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-text {
            background-color: #f3e8ff;
            background-image: linear-gradient(45deg, #a855f7, #ec4899);
            background-size: 100%;
            -webkit-background-clip: text;
            -moz-background-clip: text;
            -webkit-text-fill-color: transparent; 
            -moz-text-fill-color: transparent;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800">
    <!-- Фоновый верхний баннер -->
    <div class="h-64 sm:h-72 w-full absolute top-0 left-0 bg-[url('https://images.unsplash.com/photo-1560066984-138dadb4c035?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')] bg-cover bg-center z-0">
        <div class="w-full h-full bg-slate-900/60 backdrop-blur-[2px]"></div>
    </div>

    <div class="max-w-5xl mx-auto p-4 md:p-8 relative z-10">
        
        <!-- Шапка с Навигацией -->
        <header class="bg-white/95 backdrop-blur-md px-6 pt-6 pb-0 rounded-2xl shadow-lg border border-white/20 mb-8 mt-4 overflow-hidden">
            <div class="flex flex-col md:flex-row justify-between flex-wrap items-start md:items-center mb-6 gap-4">
                <div class="flex items-center gap-4">
                    <img src="https://ui-avatars.com/api/?name={{ data.name }}&background=a855f7&color=fff&size=64&rounded=true" alt="Avatar" class="w-14 h-14 rounded-full shadow-sm ring-2 ring-white">
                    <div>
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Салон <span class="gradient-text">Стиль и Грация</span></h1>
                        <p class="text-slate-500 mt-1">
                            Добро пожаловать, <span class="font-semibold text-slate-700">{{ data.name }}</span>!
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="/logout" class="bg-white border border-slate-200 text-rose-500 px-5 py-2 rounded-xl text-sm font-semibold hover:bg-rose-50 hover:border-rose-100 transition shadow-sm flex items-center gap-2">
                        Выйти
                    </a>
                </div>
            </div>
            
            <!-- Накладная навигация -->
            <nav class="flex gap-6 border-b border-slate-200 overflow-x-auto whitespace-nowrap hide-scrollbar">
                <a href="/" class="pb-3 text-sm font-bold border-b-2 transition {% if request.path == '/' %}border-indigo-600 text-indigo-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
                    👨‍💼 Мой профиль 
                </a>
                <a href="/booking" class="pb-3 text-sm font-bold border-b-2 transition {% if request.path == '/booking' %}border-indigo-600 text-indigo-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
                    📅 Онлайн-запись
                </a>
                <a href="/services" class="pb-3 text-sm font-bold border-b-2 transition {% if '/service' in request.path %}border-indigo-600 text-indigo-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
                    ✨ Наши услуги (AI)
                </a>
                <a href="/qa" class="pb-3 text-sm font-bold border-b-2 transition {% if request.path == '/qa' %}border-indigo-600 text-indigo-600{% else %}border-transparent text-slate-500 hover:text-slate-800{% endif %}">
                    💡 Вопросы и ответы
                </a>
            </nav>
        </header>

        <!-- Основной контент страницы -->
        <main>
            {% block content %}{% endblock %}
        </main>
        
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
