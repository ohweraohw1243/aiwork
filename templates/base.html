<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Личный кабинет{% endblock %} — Стиль и Грация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --noir:      #07070A;
            --graphite:  #111118;
            --surface:   #18181F;
            --raised:    #1F1F28;
            --border:    rgba(201,168,76,0.18);
            --border-hi: rgba(201,168,76,0.42);
            --gold:      #C9A84C;
            --gold-hi:   #E4C97A;
            --gold-dim:  rgba(201,168,76,0.12);
            --cream:     #EDE3D0;
            --cream-dim: #A89E8C;
            --mist:      #6A6A7A;
            --mauve:     #8C7080;
            --blush:     #D9B8AE;
            --pearl:     #F2E8DD;
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            background: radial-gradient(1200px 600px at 15% -20%, rgba(217,184,174,0.08) 0%, transparent 60%),
                        radial-gradient(900px 500px at 85% 10%, rgba(201,168,76,0.08) 0%, transparent 60%),
                        var(--noir);
            color: var(--cream);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        /* Ambient glow */
        body::after {
            content: '';
            position: fixed;
            top: -10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 60vh;
            background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .brand-serif { font-family: 'Playfair Display', serif; }

        /* ── CARDS ── */
        .luxury-card {
            background: linear-gradient(180deg, rgba(24,24,31,0.98) 0%, rgba(17,17,24,0.98) 100%);
            border: 1px solid var(--border);
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.35);
        }
        .luxury-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(201,168,76,0.05) 0%, transparent 50%, rgba(201,168,76,0.02) 100%);
            pointer-events: none;
        }

        /* ── GOLD LINE ── */
        .gold-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        /* ── CHIP ── */
        .luxury-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border: 1px solid var(--border);
            background: var(--gold-dim);
            color: var(--gold);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            border-radius: 2px;
        }

        /* ── BUTTONS ── */
        .btn-gold {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 36px;
            background: linear-gradient(135deg, #B8942E, #C9A84C, #DDB95E);
            color: #07070A;
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-gold::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .btn-gold:hover::after { transform: translateX(100%); }
        .btn-gold:hover { box-shadow: 0 8px 40px rgba(201,168,76,0.3); transform: translateY(-1px); }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 36px;
            background: transparent;
            color: var(--cream-dim);
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.35s ease;
        }
        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--gold-dim);
        }

        /* ── HEADER ── */
        .header-shell {
            padding: 22px 36px 8px;
            background: linear-gradient(180deg, rgba(24,24,31,0.98) 0%, rgba(17,17,24,0.92) 100%);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }
        .brand-badge {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }
        .brand-icon {
            width: 42px;
            height: 42px;
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
        }
        .brand-kicker {
            font-size: 10px;
            color: var(--mist);
            letter-spacing: 0.24em;
            text-transform: uppercase;
        }
        .brand-name {
            font-size: 16px;
            color: var(--cream);
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .account-chip {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(201,168,76,0.06);
        }
        .account-label {
            font-size: 9px;
            color: var(--mist);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .account-name {
            font-size: 13px;
            color: var(--cream);
            font-weight: 500;
            margin-top: 4px;
        }
        .avatar-frame {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .nav-row {
            display: flex;
            gap: 28px;
            margin-top: 16px;
            padding: 12px 0 6px;
            border-top: 1px solid var(--border);
            overflow-x: auto;
        }

        /* ── NAV ── */
        .nav-link {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--mist);
            transition: color 0.25s;
            padding: 20px 0;
            border-bottom: 1px solid transparent;
            transition: all 0.25s ease;
            position: relative;
        }
        .nav-link:hover { color: var(--cream); }
        .nav-link.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ── TABLE ── */
        .luxury-table th {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--mist);
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }
        .luxury-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
            color: var(--cream-dim);
        }
        .luxury-table tr:last-child td { border-bottom: none; }
        .luxury-table tr:hover td { background: rgba(201,168,76,0.04); color: var(--cream); }

        /* ── INPUT ── */
        .luxury-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--raised);
            border: 1px solid var(--border);
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.04em;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.25s, background 0.25s;
        }
        .luxury-input::placeholder { color: var(--mist); }
        .luxury-input:focus { border-color: var(--gold); background: var(--surface); }

        .luxury-label {
            display: block;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--mist);
            margin-bottom: 10px;
        }

        /* ── SELECT ── */
        .luxury-select {
            appearance: none;
            width: 100%;
            padding: 14px 18px;
            background: var(--raised);
            border: 1px solid var(--border);
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            font-weight: 300;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.25s;
        }
        .luxury-select:focus { border-color: var(--gold); }
        .luxury-select option { background: var(--graphite); color: var(--cream); }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--graphite); }
        ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

        /* ── ANIMATIONS ── */
        .fade-up { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .fade-up.d1 { animation-delay: 0.1s; }
        .fade-up.d2 { animation-delay: 0.2s; }
        .fade-up.d3 { animation-delay: 0.3s; }
        .fade-up.d4 { animation-delay: 0.4s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hover-rise { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-rise:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }

        /* ── STATUS BADGE ── */
        .badge-active {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 4px 10px;
            border: 1px solid rgba(180,212,160,0.3);
            background: rgba(180,212,160,0.08);
            color: #A8D090;
            border-radius: 2px;
        }
        .badge-done {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 4px 10px;
            border: 1px solid var(--border);
            background: var(--gold-dim);
            color: var(--gold);
            border-radius: 2px;
        }

        /* Divider with text */
        .divider-text {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--mist);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .divider-text::before, .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Gold underline heading */
        .headline-accent {
            position: relative;
            display: inline-block;
        }
        .headline-accent::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), transparent 80%);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div style="position: relative; z-index: 1;">
        <div style="max-width: 1280px; margin: 0 auto; padding: 24px 32px;">

            <!-- ── HEADER ── -->
            <header class="luxury-card fade-up header-shell" style="border-radius: 6px; margin-bottom: 28px;">
                <div class="header-top">
                    <a href="/" class="brand-badge">
                        <div class="brand-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5">
                                <circle cx="12" cy="12" r="9"/>
                                <path d="M12 7v5l3 3"/>
                            </svg>
                        </div>
                        <div>
                            <div class="brand-kicker">beauty atelier</div>
                            <div class="brand-name brand-serif">Стиль и Грация</div>
                        </div>
                    </a>

                    <div class="account-chip">
                        <div>
                            <div class="account-label">клиент</div>
                            <div class="account-name">{{ data.name if data else 'Гость' }}</div>
                        </div>
                        <div class="avatar-frame">
                            <img src="https://ui-avatars.com/api/?name={{ data.name if data else 'Guest' }}&background=18181F&color=C9A84C&size=80" alt="Avatar" style="width: 100%; height: 100%;">
                        </div>
                        {% if session.get('user_id') %}
                        <a href="/logout" class="btn-outline" style="padding: 9px 22px; font-size: 10px;">Выйти</a>
                        {% else %}
                        <a href="/login" class="btn-outline" style="padding: 9px 22px; font-size: 10px;">Войти</a>
                        {% endif %}
                    </div>
                </div>

                <!-- Navigation -->
                <nav class="nav-row">
                    <a href="/cabinet" class="nav-link {% if request.path == '/cabinet' %}active{% endif %}">
                        Профиль
                    </a>
                    <a href="/booking" class="nav-link {% if request.path == '/booking' %}active{% endif %}">
                        Онлайн-запись
                    </a>
                    <a href="/services" class="nav-link {% if '/service' in request.path %}active{% endif %}">
                        Услуги
                    </a>
                    <a href="/qa" class="nav-link {% if request.path == '/qa' %}active{% endif %}">
                        Вопросы
                    </a>
                </nav>
            </header>

            <!-- ── MAIN ── -->
            <main style="padding-bottom: 60px;">
                {% block content %}{% endblock %}
            </main>

        </div>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
